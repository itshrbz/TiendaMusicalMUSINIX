<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix Admin - Register Bundle</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Musinix Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="sales.html">Sales History</a>
            <a href="users.html">Users</a>
            <a href="products.html">Products</a>
            <a href="bundles.html">Bundles</a>
            <a href="events.html">Events</a>
            <a href="../index.html">Back to Store</a>
        </aside>

        <main class="admin-content">
            <h1>Register New Bundle</h1>
            <p>Create a new bundle with music products.</p>

            <div class="register-layout">
                <form class="form-box">
                    <label>Bundle name</label>
                    <input type="text">

                    <label>Products included</label>
                    <input type="text">

                    <label>Category</label>
                    <input type="text">

                    <label>Price</label>
                    <input type="text">

                    <label>Stock</label>
                    <input type="text">

                    <label>Description</label>
                    <textarea></textarea>

                    <button type="button">Save Bundle</button>
                </form>

                <div class="preview-card">
                    <div class="image-placeholder">Image</div>
                    <h3>Bundle Preview</h3>
                    <p>Bundle information will be shown here.</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
