<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix Admin - Products</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Musinix Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="sales.html">Sales History</a>
            <a href="users.html">Users</a>
            <a href="products.html">Products</a>
            <a href="bundles.html">Bundles</a>
            <a href="events.html">Events</a>

        <main class="admin-content">
            <div class="admin-header">
                <h1>Product Inventory</h1>
                <a class="button-link" href="register-product.html">Add Product</a>

            <table class="table">
                <thead>
                    <tr>
                        <th>Product Name</th>

                    <tr>
                        <td>Digital Album</td>
                        <td>Digital</td>
                        <td>$10.00</td>

                        <td>
                            <a href="edit-product.html">Edit</a>
                            <a href="#">Delete</a>

                    </tr>
                    <tr>
                        <td>Vinyl Album</td>
                        <td>Physical</td>
                        <td>$25.00</td>
                        <td>15</td>
                        <td>
                            <a href="edit-product.html">Edit</a>
                            <a href="#">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>
