<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix Admin - Edit Bundle</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Musinix Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="sales.html">Sales History</a>
            <a href="users.html">Users</a>
            <a href="products.html">Products</a>
            <a href="bundles.html">Bundles</a>
            <a href="events.html">Events</a>
            <a href="../index.html">Back to Store</a>
        </aside>

        <main class="admin-content">
            <h1>Edit Bundle</h1>
            <p>Modify bundle information.</p>

            <div class="register-layout">
                <form class="form-box">
                    <label>Bundle name</label>
                    <input type="text" value="Rock Bundle">

                    <label>Products included</label>
                    <input type="text" value="Digital Album, Vinyl Album">

                    <label>Category</label>
                    <input type="text" value="Rock">

                    <label>Price</label>
                    <input type="text" value="30.00">

                    <label>Stock</label>
                    <input type="text" value="10">

                    <label>Description</label>
                    <textarea>Bundle with digital and physical products.</textarea>

                    <button type="button">Update Bundle</button>
                </form>

                <div class="preview-card">
                    <div class="image-placeholder">Image</div>
                    <h3>Rock Bundle</h3>
                    <p>Bundle preview.</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
