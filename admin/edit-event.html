<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix Admin - Edit Event</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar">
            <h2>Musinix Admin</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="sales.html">Sales History</a>
            <a href="users.html">Users</a>
            <a href="products.html">Products</a>
            <a href="bundles.html">Bundles</a>
            <a href="events.html">Events</a>
            <a href="../index.html">Back to Store</a>
        </aside>

        <main class="admin-content">
            <h1>Edit Event</h1>
            <p>Modify event or discount information.</p>

            <div class="register-layout">
                <form class="form-box">
                    <label>Event name</label>
                    <input type="text" value="Music Week">

                    <label>Description</label>
                    <textarea>Discounts in digital albums.</textarea>

                    <label>Discount percentage</label>
                    <input type="text" value="15">

                    <label>Start date</label>
                    <input type="date" value="2026-06-10">

                    <label>End date</label>
                    <input type="date" value="2026-06-12">

                    <button type="button">Update Event</button>
                </form>

                <div class="preview-card">
                    <div class="image-placeholder">Image</div>
                    <h3>Music Week</h3>
                    <p>Event preview.</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
