<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix - Payment</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Musinix</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <main class="container">
        <section class="section">
            <h1>Payment</h1>

            <div class="cart-layout">
                <form class="form-box">
                    <h2>Credit or Debit Card</h2>

                    <label>Card holder name</label>
                    <input type="text">

                    <label>Card number</label>
                    <input type="text">

                    <label>Expiration date</label>
                    <input type="text">

                    <label>CVV</label>
                    <input type="text">
                </form>

                <div class="summary-box">
                    <h2>Payment Summary</h2>
                    <p>Products: $35.00</p>
                    <p>Shipping: $5.00</p>
                    <h3>Total: $40.00</h3>
                    <a class="button-link" href="invoice.html">Confirm Payment</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div>
            <h3>Musinix</h3>
            <p>Online music shop</p>
        </div>

        <div>
            <h4>Customer Support</h4>
            <p>Contact</p>
            <p>Shipping</p>
            <p>Payment</p>
        </div>

        <div>
            <h4>Company</h4>
            <p>About us</p>
            <p>Events</p>
            <p>Bundles</p>
        </div>

        <div>
            <h4>Follow us</h4>
            <p>Instagram</p>
            <p>Facebook</p>
            <p>Twitter</p>
        </div>
    </footer>

</body>
</html>
