<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinix - Payment</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo" style="display: flex; align-items: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform: translateY(-1px);">
                <path d="M12 2V22M2 12H22M19.07 4.93L4.93 19.07M19.07 19.07L4.93 4.93" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            Musinix
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
        </nav>
    </header>

    <main class="container">
        <section class="section">
            <h1>Payment</h1>

            <div class="cart-layout">
                <form class="form-box">
                    <h2>Credit or Debit Card</h2>

                    <label>Card holder name</label>
                    <input type="text">

                    <label>Card number</label>
                    <input type="text">

                    <label>Expiration date</label>
                    <input type="text">

                    <label>CVV</label>
                    <input type="text">
                </form>

                <div class="summary-box">
                    <h2>Payment Summary</h2>
                    <p>Products: $35.00</p>
                    <p>Shipping: $5.00</p>
                    <h3>Total: $40.00</h3>
                    <a class="button-link" href="invoice.html">Confirm Payment</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
